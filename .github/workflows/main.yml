on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v2
        with:
          node-version: '14'
      - name: Install dependencies
        run: npm install
      - name: Clean reports
        run: |
          node -e "const fs = require('fs'); const path = 'cypress/reports'; fs.rmSync(path, { recursive: true, force: true }); fs.mkdirSync(path + '/mochareports', { recursive: true });"
      - name: Run tests
        run: npm run scripts
      - name: Run posttest
        run: npm run posttest
      - name: Publish Report
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: cypress/reports/mochareports
